<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recruiter Dashboard – Interview Scheduler</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container-fluid px-4">
    <span class="navbar-brand fw-bold"><i class="bi bi-calendar-check me-2"></i>Interview Scheduler <span id="appVersion" class="badge bg-secondary fw-normal ms-1" style="font-size:0.6rem;vertical-align:middle;"></span></span>
    <div class="d-flex align-items-center gap-3 ms-auto">
      <span class="badge bg-light text-primary fw-semibold"><i class="bi bi-person-circle me-1"></i><span id="navName"></span></span>
      <button class="btn btn-sm btn-outline-light position-relative" id="notifBtn" title="Notifications">
        <i class="bi bi-bell"></i>
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none" id="notifBadge"></span>
      </button>
      <button class="btn btn-sm btn-outline-light" id="profileBtn" title="Edit Profile"><i class="bi bi-person-circle"></i></button>
      <button class="btn btn-sm btn-outline-warning" id="changePwBtn" title="Change Password"><i class="bi bi-key"></i></button>
      <button class="btn btn-sm btn-outline-light" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </div>
  </div>
</nav>

<!-- NOTIFICATION PANEL -->
<div id="notifPanel" class="notif-panel shadow d-none">
  <div class="d-flex justify-content-between align-items-center px-3 py-2 border-bottom">
    <strong>Notifications</strong>
    <button class="btn btn-sm btn-link text-muted" id="markAllReadBtn">Mark all read</button>
  </div>
  <div id="notifList" class="notif-list"></div>
</div>

<div class="container-fluid px-4 py-4">
  <div class="row g-4">

    <!-- LEFT: Search & Book -->
    <div class="col-xl-4 col-lg-5">

      <!-- Search Available Slots -->
      <div class="card border-0 shadow-sm rounded-4 mb-4">
        <div class="card-header bg-white border-0 pt-4 pb-0 px-4">
          <h5 class="fw-bold mb-0"><i class="bi bi-search text-primary me-2"></i>Find Available Slots</h5>
        </div>
        <div class="card-body px-4">
          <div class="mb-3">
            <label class="form-label fw-semibold small">Filter by Skill</label>
            <select class="form-select" id="filterSkill">
              <option value="">All Skills</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold small">Filter by Date</label>
            <input type="date" class="form-control" id="filterDate" />
          </div>
          <button class="btn btn-primary w-100" id="searchBtn">
            <i class="bi bi-search me-1"></i>Search Slots
          </button>
        </div>
      </div>

      <!-- Available Slots List -->
      <div class="card border-0 shadow-sm rounded-4 mb-4">
        <div class="card-header bg-white border-0 pt-4 pb-0 px-4 d-flex justify-content-between align-items-center">
          <h5 class="fw-bold mb-0"><i class="bi bi-clock text-success me-2"></i>Available Slots</h5>
          <span class="badge bg-success" id="slotCount">0</span>
        </div>
        <div class="card-body px-3 pt-2">
          <div id="slotsList" class="slots-list">
            <div class="text-center text-muted py-4">
              <i class="bi bi-search fs-3 d-block mb-2 opacity-50"></i>
              Search for available slots above
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- RIGHT: Calendar + Upcoming -->
    <div class="col-xl-8 col-lg-7">

      <!-- Stats cards -->
      <div class="row g-3 mb-4">
        <div class="col-4">
          <div class="card border-0 shadow-sm rounded-4 text-center py-3">
            <div class="h3 fw-bold text-primary mb-0" id="statTotal">0</div>
            <div class="text-muted small">Total Booked</div>
          </div>
        </div>
        <div class="col-4">
          <div class="card border-0 shadow-sm rounded-4 text-center py-3">
            <div class="h3 fw-bold text-warning mb-0" id="statConfirmed">0</div>
            <div class="text-muted small">Confirmed</div>
          </div>
        </div>
        <div class="col-4">
          <div class="card border-0 shadow-sm rounded-4 text-center py-3">
            <div class="h3 fw-bold text-danger mb-0" id="statDeclined">0</div>
            <div class="text-muted small">Declined</div>
          </div>
        </div>
      </div>

      <!-- Calendar -->
      <div class="card border-0 shadow-sm rounded-4 mb-4">
        <div class="card-header bg-white border-0 pt-4 pb-0 px-4">
          <h5 class="fw-bold mb-3"><i class="bi bi-calendar3 text-primary me-2"></i>My Interview Calendar</h5>
        </div>
        <div class="card-body px-4 pb-4">
          <div id="calendar"></div>
        </div>
      </div>

      <!-- Feedback Received -->
      <div class="card border-0 shadow-sm rounded-4 mb-4">
        <div class="card-header bg-white border-0 pt-4 pb-0 px-4">
          <h5 class="fw-bold mb-3"><i class="bi bi-star-half text-warning me-2"></i>Interview Feedback</h5>
        </div>
        <div class="card-body px-4 pb-4">
          <div id="feedbackList">
            <div class="text-muted text-center py-3 small">Loading feedback…</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- BOOK INTERVIEW MODAL -->
<div class="modal fade" id="bookModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 rounded-4">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold"><i class="bi bi-plus-circle text-primary me-2"></i>Book Interview</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="bg-light rounded-3 p-3 mb-3">
          <div class="small text-muted mb-1">Selected Slot</div>
          <div class="fw-semibold" id="bookSlotInfo"></div>
        </div>
        <div id="bookError" class="alert alert-danger d-none"></div>
        <div class="mb-3">
          <label class="form-label fw-semibold small">Candidate Name <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="candidateName" placeholder="Full name" maxlength="200" />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold small">Candidate Email <span class="text-danger">*</span></label>
          <input type="email" class="form-control" id="candidateEmail" placeholder="email@example.com" maxlength="200" />
        </div>
        <input type="hidden" id="bookSlotId" />
      </div>
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="confirmBookBtn">
          <span id="bookSpinner" class="spinner-border spinner-border-sm d-none me-1"></span>
          Confirm Booking
        </button>
      </div>
    </div>
  </div>
</div>

<!-- EVENT DETAIL MODAL -->
<div class="modal fade" id="eventModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 rounded-4">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold"><i class="bi bi-info-circle text-primary me-2"></i>Interview Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="eventDetails"></div>
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<!-- FEEDBACK DETAILS MODAL -->
<div class="modal fade" id="feedbackDetailModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 rounded-4">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold"><i class="bi bi-star text-warning me-2"></i>Interview Feedback</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="feedbackDetailContent"></div>
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
<script src="js/common.js"></script>
<script src="js/recruiter.js"></script>
</body>
</html>
