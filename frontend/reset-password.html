<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – Interview Scheduler</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-5">

            <!-- Header -->
            <div class="text-center mb-4">
              <div class="app-logo mb-3">
                <i class="bi bi-key-fill text-primary" style="font-size:2.5rem"></i>
              </div>
              <h4 class="fw-bold mb-1">Reset Password</h4>
              <p class="text-muted small">Enter your new password below.</p>
            </div>

            <div id="alertBox" class="d-none"></div>

            <form id="resetForm">
              <div class="mb-3">
                <label class="form-label fw-semibold small">New Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                  <input type="password" class="form-control" id="newPw"
                         placeholder="Min 6 characters" autocomplete="new-password" required />
                </div>
              </div>
              <div class="mb-4">
                <label class="form-label fw-semibold small">Confirm New Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-light"><i class="bi bi-lock-fill"></i></span>
                  <input type="password" class="form-control" id="confirmPw"
                         placeholder="Repeat new password" autocomplete="new-password" required />
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="submitBtn">
                <span id="spinner" class="spinner-border spinner-border-sm d-none me-2"></span>
                Set New Password
              </button>
            </form>

            <hr class="my-4" />
            <div class="text-center">
              <a href="/" class="text-muted small"><i class="bi bi-arrow-left me-1"></i>Back to Sign In</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token') || '';

    function showAlert(msg, type) {
      const el = document.getElementById('alertBox');
      el.className = `alert alert-${type}`;
      el.textContent = msg;
      el.classList.remove('d-none');
    }

    if (!token) {
      showAlert('No reset token found. Please use the link from your email.', 'danger');
      document.getElementById('resetForm').style.display = 'none';
    }

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPw     = document.getElementById('newPw').value;
      const confirmPw = document.getElementById('confirmPw').value;
      const btn       = document.getElementById('submitBtn');
      const spinner   = document.getElementById('spinner');

      if (newPw.length < 6) { showAlert('Password must be at least 6 characters.', 'danger'); return; }
      if (newPw !== confirmPw) { showAlert('Passwords do not match.', 'danger'); return; }

      btn.disabled = true;
      spinner.classList.remove('d-none');

      try {
        const res  = await fetch('/api/auth/reset-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ token, new_password: newPw })
        });
        const data = await res.json();
        if (!res.ok) {
          showAlert(data.error || 'Reset failed. The link may have expired.', 'danger');
        } else {
          showAlert(data.message, 'success');
          document.getElementById('resetForm').style.display = 'none';
          setTimeout(() => window.location.href = '/', 2500);
        }
      } catch {
        showAlert('Network error. Please try again.', 'danger');
      } finally {
        btn.disabled = false;
        spinner.classList.add('d-none');
      }
    });
  </script>
</body>
</html>
