<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interview Scheduler – Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-light d-flex align-items-center min-vh-100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <div class="app-logo mb-3">
                <i class="bi bi-calendar-check-fill text-primary" style="font-size:2.5rem"></i>
              </div>
              <h3 class="fw-bold mb-1">Interview Scheduler</h3>
              <p class="text-muted small">Sign in to continue</p>
              <p id="loginVersion" class="text-muted" style="font-size:0.7rem;margin-top:-4px;"></p>
            </div>

            <div id="loginError" class="alert alert-danger d-none"></div>

            <form id="loginForm">
              <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <div class="input-group">
                  <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                  <input type="text" class="form-control" id="username"
                         placeholder="Enter username" autocomplete="username" required />
                </div>
              </div>
              <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                  <input type="password" class="form-control" id="password"
                         placeholder="Enter password" autocomplete="current-password" required />
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="loginBtn">
                <span id="loginSpinner" class="spinner-border spinner-border-sm d-none me-2"></span>
                Sign In
              </button>
            </form>

            <div class="text-center mt-3">
              <a href="#" class="text-muted small" id="forgotPwLink">
                <i class="bi bi-question-circle me-1"></i>Forgot password?
              </a>
            </div>

            <hr class="my-4" />
            <div class="bg-light rounded-3 p-3">
              <p class="text-muted small mb-2 fw-semibold">Demo accounts (password: <code>admin123</code>)</p>
              <div class="d-flex flex-wrap gap-1">
                <button class="btn btn-outline-secondary btn-sm demo-login" data-user="admin">Admin</button>
                <button class="btn btn-outline-secondary btn-sm demo-login" data-user="recruiter1">Recruiter</button>
                <button class="btn btn-outline-secondary btn-sm demo-login" data-user="interviewer1">Interviewer 1</button>
                <button class="btn btn-outline-secondary btn-sm demo-login" data-user="interviewer2">Interviewer 2</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── Forgot Password Modal ───────────────────────────────
    const fpHtml = `
    <div class="modal fade" id="forgotPwModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 rounded-4">
          <div class="modal-header border-0 pb-0">
            <h5 class="modal-title fw-bold">
              <i class="bi bi-key me-2 text-primary"></i>Forgot Password
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div id="fpAlert" class="d-none mb-3"></div>
            <p class="text-muted small mb-3">
              Enter your account email. If it matches an account, a reset link will be sent.
            </p>
            <label class="form-label fw-semibold small">Email Address</label>
            <input type="email" class="form-control" id="fpEmail" placeholder="your@email.com" maxlength="200" />
          </div>
          <div class="modal-footer border-0 pt-0">
            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-primary" id="fpSendBtn">
              <span id="fpSpinner" class="spinner-border spinner-border-sm d-none me-1"></span>
              Send Reset Link
            </button>
          </div>
        </div>
      </div>
    </div>`;
    document.body.insertAdjacentHTML('beforeend', fpHtml);

    document.getElementById('forgotPwLink').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('fpEmail').value = '';
      document.getElementById('fpAlert').className = 'd-none mb-3';
      new bootstrap.Modal(document.getElementById('forgotPwModal')).show();
    });

    document.getElementById('fpSendBtn').addEventListener('click', async () => {
      const email   = document.getElementById('fpEmail').value.trim();
      const alertEl = document.getElementById('fpAlert');
      const spinner = document.getElementById('fpSpinner');
      const btn     = document.getElementById('fpSendBtn');
      alertEl.className = 'd-none mb-3';

      if (!email) {
        alertEl.className   = 'alert alert-danger mb-3';
        alertEl.textContent = 'Please enter your email address.';
        return;
      }

      btn.disabled = true;
      spinner.classList.remove('d-none');
      try {
        const res  = await fetch('/api/auth/forgot-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email })
        });
        const data = await res.json();
        alertEl.className   = 'alert alert-success mb-3';
        alertEl.textContent = data.message || 'Reset link sent if account exists.';
      } catch {
        alertEl.className   = 'alert alert-danger mb-3';
        alertEl.textContent = 'Network error. Please try again.';
      } finally {
        btn.disabled = false;
        spinner.classList.add('d-none');
      }
    });
    fetch('/api/version').then(r => r.json()).then(d => {
      const v = document.getElementById('loginVersion');
      if (v) v.textContent = 'v' + d.version;
    }).catch(() => {});

    // If already logged in, redirect
    const token = localStorage.getItem('token');
    const user  = JSON.parse(localStorage.getItem('user') || 'null');
    if (token && user) {
      redirectByRole(user.role);
    }

    function redirectByRole(role) {
      if (role === 'admin')        window.location.href = '/admin.html';
      else if (role === 'recruiter') window.location.href = '/recruiter.html';
      else                           window.location.href = '/interviewer.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const spinner = document.getElementById('loginSpinner');
      const errDiv  = document.getElementById('loginError');
      errDiv.classList.add('d-none');
      btn.disabled = true;
      spinner.classList.remove('d-none');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        localStorage.setItem('token', data.token);
        localStorage.setItem('user',  JSON.stringify(data.user));
        redirectByRole(data.user.role);
      } catch (err) {
        errDiv.textContent = err.message;
        errDiv.classList.remove('d-none');
      } finally {
        btn.disabled = false;
        spinner.classList.add('d-none');
      }
    });

    document.querySelectorAll('.demo-login').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById('username').value = btn.dataset.user;
        document.getElementById('password').value = 'admin123';
        document.getElementById('loginForm').requestSubmit();
      });
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
